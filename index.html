<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&family=Noto+Sans+KR:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Gaegu', cursive;
    background: white;
}

/* 섹션 */
section {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

section:nth-child(odd) {
    background: #ffeef3;
}

.wrapper {
    max-width: 1200px;
    text-align: center;
}

h1 {
    font-size: 48px;
    color: #ff7aa2;
}

h2 {
    margin-bottom: 30px;
}

/* 이미지 */
.content {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.content img {
    width: 300px;
    height: 200px;
    object-fit: cover;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.content img:hover {
    transform: scale(1.05);
}

/* ✅ 헤더 */
.btns {
    position: fixed;
    top: 20px;
    width: 100%;
    z-index: 10;
    display: flex;
    justify-content: center;
}

/* 유리 느낌 */
.container {
    display: flex;
    gap: 10px;
    padding: 10px 20px;
    border-radius: 50px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    font-family: 'Noto Sans KR', sans-serif;
}

/* 버튼 */
.btn {
    padding: 8px 18px;
    border-radius: 30px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
}

.btn:hover {
    background: #ff7aa2;
    color: white;
}

/* 위 버튼 */
.arrow-up {
    position: fixed;
    bottom: 50px;
    right: 50px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #ff7aa2;
    color: white;
    font-size: 24px;
    border: none;
    opacity: 0;
    transition: 0.3s;
}

.arrow-up.show {
    opacity: 1;
}

/* 모달 */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.modal.show {
    opacity: 1;
    pointer-events: auto;
}

.modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}
</style>
</head>

<body>

<button class="arrow-up">↑</button>

<!-- ✅ 개선된 헤더 -->
<div class="btns">
    <div class="container">
        <button class="btn home">Home</button>
        <button class="btn about">About</button>
        <button class="btn skills">Skills</button>
        <button class="btn works">Works</button>
        <button class="btn contact">Contact</button>
    </div>
</div>

<!-- HOME -->
<section id="home">
    <div class="wrapper">
        <h1>Home</h1>
        <h2>메인 소개</h2>
        <div class="content">
            <img src="images/home1.jpg">
            <img src="images/home2.jpg">
        </div>
    </div>
</section>

<!-- ABOUT -->
<section id="about">
    <div class="wrapper">
        <h1>About</h1>
        <h2>나에 대한 소개</h2>
        <div class="content">
            <img src="hadomin_design/img/프로필.jpg">
            <img src="img/about2.jpg">
        </div>
    </div>
</section>

<!-- SKILLS -->
<section id="skills">
    <div class="wrapper">
        <h1>Skills</h1>
        <h2>기술</h2>
        <div class="content">
            <img src="hadomin_design/img/포토샵로고.png">
            <img src="img/skills2.jpg">
        </div>
    </div>
</section>

<!-- WORKS -->
<section id="works">
    <div class="wrapper">
        <h1>Works</h1>
        <h2>작업물 </h2>
        <div class="content works-imgs">

            <img src="hadomin_design/img/의정부.png">
            <img src="hadomin_design/img/이즈니.png">
            <img src="hadomin_design/img/flower_poster.png">
        </div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <div class="wrapper">
        <h1>Contact</h1>
        <h2>연락처</h2>
        <div class="content">
            <img src="images/contact1.jpg">
        </div>
    </div>
</section>

<!-- 모달 -->
<div class="modal">
    <img src="" id="modal-img">
</div>

<script>
const arrowUp = document.querySelector('.arrow-up');

window.addEventListener('scroll', () => {
    if (window.scrollY > 300) {
        arrowUp.classList.add('show');
    } else {
        arrowUp.classList.remove('show');
    }
});

arrowUp.onclick = () => scrollTo('#home');

document.querySelector('.home').onclick = () => scrollTo('#home');
document.querySelector('.about').onclick = () => scrollTo('#about');
document.querySelector('.skills').onclick = () => scrollTo('#skills');
document.querySelector('.works').onclick = () => scrollTo('#works');
document.querySelector('.contact').onclick = () => scrollTo('#contact');

function scrollTo(id) {
    document.querySelector(id).scrollIntoView({ behavior: 'smooth' });
}

/* 모달 */
const modal = document.querySelector('.modal');
const modalImg = document.querySelector('#modal-img');
const worksImgs = document.querySelectorAll('.works-imgs img');

worksImgs.forEach(img => {
    img.addEventListener('click', () => {
        modal.classList.add('show');
        modalImg.src = img.src;
    });
});

modal.addEventListener('click', () => {
    modal.classList.remove('show');
});

window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        modal.classList.remove('show');
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<style>
body {
    margin: 0;
    font-family: sans-serif;
}

section {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

section:nth-child(odd) {
    background: #eefaff;
}

.wrapper {
    max-width: 1200px;
    text-align: center;
}

h1 {
    font-size: 48px;
    color: skyblue;
}

h2 {
    margin-bottom: 30px;
}

/* 이미지 */
.content {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.content img {
    width: 300px;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
}

/* 메뉴 */
.btns {
    position: fixed;
    top: 0;
    width: 100%;
}

.container {
    background: #333;
    padding: 15px;
    text-align: center;
}

.btn {
    margin: 5px;
    padding: 10px 20px;
    background: #9ad2d9;
    border: none;
    cursor: pointer;
}

/* 위 버튼 */
.arrow-up {
    position: fixed;
    bottom: 50px;
    right: 50px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: skyblue;
    color: white;
    font-size: 24px;
    border: none;
    opacity: 0;
    transition: 0.3s;
}

.arrow-up.show {
    opacity: 1;
}

/* 🔥 모달 */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

.modal.show {
    opacity: 1;
    pointer-events: auto;
}

.modal img {
    max-width: 90%;
    max-height: 80%;
    border-radius: 10px;
}
</style>
</head>

<body>

<button class="arrow-up">↑</button>

<div class="btns">
    <div class="container">
        <button class="btn home">Home</button>
        <button class="btn about">About</button>
        <button class="btn skills">Skills</button>
        <button class="btn works">Works</button>
        <button class="btn contact">Contact</button>
    </div>
</div>

<!-- HOME -->
<section id="home">
    <div class="wrapper">
        <h1>Home</h1>
        <h2>메인 소개</h2>
        <div class="content">
            <img src="images/home1.jpg">
            <img src="images/home2.jpg">
        </div>
    </div>
</section>

<!-- ABOUT -->
<section id="about">
    <div class="wrapper">
        <h1>About</h1>
        <h2>나에 대한 소개</h2>
        <div class="content">
            <img src="images/프로필.jpg">
            <img src="images/about2.jpg">
        </div>
    </div>
</section>

<!-- SKILLS -->
<section id="skills">
    <div class="wrapper">
        <h1>Skills</h1>
        <h2>기술</h2>
        <div class="content">
            <img src="images/skills1.jpg">
            <img src="images/skills2.jpg">
        </div>
    </div>
</section>

<!-- WORKS -->
<section id="works">
    <div class="wrapper">
        <h1>Works</h1>
        <h2>작업물 (클릭하면 확대됨)</h2>
        <div class="content works-imgs">
            <img src="images/works1.jpg">
            <img src="images/works2.jpg">
            <img src="images/works3.jpg">
        </div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <div class="wrapper">
        <h1>Contact</h1>
        <h2>연락처</h2>
        <div class="content">
            <img src="images/contact1.jpg">
        </div>
    </div>
</section>

<!-- 🔥 모달 -->
<div class="modal">
    <img src="" id="modal-img">
</div>

<script>
const arrowUp = document.querySelector('.arrow-up');

window.addEventListener('scroll', () => {
    if (window.scrollY > 300) {
        arrowUp.classList.add('show');
    } else {
        arrowUp.classList.remove('show');
    }
});

arrowUp.onclick = () => scrollTo('#home');

document.querySelector('.home').onclick = () => scrollTo('#home');
document.querySelector('.about').onclick = () => scrollTo('#about');
document.querySelector('.skills').onclick = () => scrollTo('#skills');
document.querySelector('.works').onclick = () => scrollTo('#works');
document.querySelector('.contact').onclick = () => scrollTo('#contact');

function scrollTo(id) {
    document.querySelector(id).scrollIntoView({ behavior: 'smooth' });
}

/* 🔥 모달 기능 */
const modal = document.querySelector('.modal');
const modalImg = document.querySelector('#modal-img');
const worksImgs = document.querySelectorAll('.works-imgs img');

worksImgs.forEach(img => {
    img.addEventListener('click', () => {
        modal.classList.add('show');
        modalImg.src = img.src;
    });
});

// 바깥 클릭 시 닫기
modal.addEventListener('click', () => {
    modal.classList.remove('show');
});

// ESC로 닫기
window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        modal.classList.remove('show');
    }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hado Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Pretendard', sans-serif;
    scroll-behavior: smooth;
    color: #333;
}

/* ===== NAV ===== */
.nav {
    position: fixed;
    width: 100%;
    z-index: 100;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.5);
}

.nav ul {
    display: flex;
    justify-content: center;
    list-style: none;
    padding: 15px;
}

.nav li {
    margin: 0 10px;
}

.nav button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(45deg,#ff9a9e,#fad0c4);
    cursor: pointer;
    font-weight: 600;
    transition: .3s;
}

.nav button:hover {
    transform: translateY(-3px);
    background: white;
}

/* ===== SECTION ===== */
section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* 배경 */
#home { background: linear-gradient(135deg,#667eea,#764ba2); color:white;}
#about { background: #f9f9f9;}
#skills { background: #fff;}
#works { background: #f1f3f5;}
#contact { background: #222; color:white;}

.container {
    max-width: 1000px;
    text-align: center;
    padding: 40px;
}

/* ===== TEXT ===== */
h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

h2 {
    font-size: 28px;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    line-height: 1.6;
}

/* ===== ANIMATION ===== */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.7s;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* ===== SKILLS ===== */
.skills-box {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.skill {
    width: 120px;
    padding: 20px;
    border-radius: 15px;
    background: white;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* ===== WORKS ===== */
.works-grid {
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 20px;
    margin-top: 30px;
}

.work {
    background: white;
    padding: 20px;
    border-radius: 15px;
    transition: .3s;
    cursor: pointer;
}

.work:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* ===== CONTACT ===== */
.contact a {
    color: #ff9a9e;
    text-decoration: none;
}

/* ===== TOP BUTTON ===== */
.top-btn {
    position: fixed;
    bottom: 40px;
    right: 40px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: none;
    background: #ff758c;
    color: white;
    font-size: 24px;
    cursor: pointer;
    opacity: 0;
    transition: .3s;
}

.top-btn.show {
    opacity: 1;
}

.top-btn:hover {
    transform: scale(1.1);
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="nav">
    <ul>
        <li><button data-link="#home">Home</button></li>
        <li><button data-link="#about">About</button></li>
        <li><button data-link="#skills">Skills</button></li>
        <li><button data-link="#works">Works</button></li>
        <li><button data-link="#contact">Contact</button></li>
    </ul>
</nav>

<!-- HOME -->
<section id="home">
    <div class="container fade">
        <h1>하도의 Portfolio</h1>
        <h2>Frontend Developer</h2>
        <p>감각적인 UI와 인터랙션을 만드는 것을 좋아합니다.</p>
    </div>
</section>

<!-- ABOUT -->
<section id="about">
    <div class="container fade">
        <h1>About Me</h1>
        <p>사용자 경험을 중요하게 생각하는 프론트엔드 개발자입니다.</p>
    </div>
</section>

<!-- SKILLS -->
<section id="skills">
    <div class="container fade">
        <h1>Skills</h1>
        <div class="skills-box">
            <div class="skill">HTML</div>
            <div class="skill">CSS</div>
            <div class="skill">JavaScript</div>
        </div>
    </div>
</section>

<!-- WORKS -->
<section id="works">
    <div class="container fade">
        <h1>Works</h1>
        <div class="works-grid">
            <div class="work">Project 1</div>
            <div class="work">Project 2</div>
            <div class="work">Project 3</div>
        </div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact">
    <div class="container fade contact">
        <h1>Contact</h1>
        <p>Email: example@email.com</p>
    </div>
</section>

<!-- TOP BUTTON -->
<button class="top-btn">↑</button>

<script>

/* 스크롤 애니메이션 */
const fades = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
    fades.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
            el.classList.add('show');
        }
    });
});

/* 메뉴 이동 */
document.querySelectorAll('[data-link]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelector(btn.dataset.link)
        .scrollIntoView({behavior:'smooth'});
    });
});

/* 탑 버튼 */
const topBtn = document.querySelector('.top-btn');

window.addEventListener('scroll', () => {
    if (window.scrollY > 300) {
        topBtn.classList.add('show');
    } else {
        topBtn.classList.remove('show');
    }
});

topBtn.addEventListener('click', () => {
    window.scrollTo({top:0, behavior:'smooth'});
});

</script>

</body>
</html>
